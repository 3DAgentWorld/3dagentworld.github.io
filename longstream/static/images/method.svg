<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070f" />
      <stop offset="0.6" stop-color="#070c1a" />
      <stop offset="1" stop-color="#05070f" />
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0.95" />
      <stop offset="0.55" stop-color="#b7ff3c" stop-opacity="0.72" />
      <stop offset="1" stop-color="#ff2bd6" stop-opacity="0.7" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto">
    <text x="90" y="120" font-size="54" font-weight="800" fill="rgba(255,255,255,0.82)">Method overview (placeholder)</text>
    <text x="90" y="170" font-size="24" fill="rgba(255,255,255,0.70)">
      Replace with your pipeline figure (inputs → LongStream → outputs).
    </text>
  </g>

  <!-- three modules -->
  <g fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)" stroke-width="2">
    <rect x="110" y="260" width="430" height="440" rx="22" />
    <rect x="585" y="260" width="430" height="440" rx="22" />
    <rect x="1060" y="260" width="430" height="440" rx="22" />
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" fill="rgba(255,255,255,0.78)">
    <text x="150" y="340" font-size="22" font-weight="800" fill="rgba(0,229,255,0.95)">① Gauge-decoupled poses</text>
    <text x="150" y="380" font-size="18">Keyframe-relative pose regression</text>
    <text x="150" y="410" font-size="18" fill="rgba(255,255,255,0.62)">remove first-frame anchoring</text>

    <text x="625" y="340" font-size="22" font-weight="800" fill="rgba(183,255,60,0.90)">② Orthogonal scale learning</text>
    <text x="625" y="380" font-size="18">Decouple geometry &amp; metric scale</text>
    <text x="625" y="410" font-size="18" fill="rgba(255,255,255,0.62)">suppress Sim(3) drift</text>

    <text x="1100" y="340" font-size="22" font-weight="800" fill="rgba(255,43,214,0.88)">③ Cache-consistent inference</text>
    <text x="1100" y="380" font-size="18">Cache-consistent training</text>
    <text x="1100" y="410" font-size="18" fill="rgba(255,255,255,0.62)">+ periodic cache refresh</text>
  </g>

  <!-- connecting arrow -->
  <path
    d="M260 740C460 780 520 780 710 740C910 695 980 695 1190 740"
    fill="none"
    stroke="url(#g)"
    stroke-width="10"
    stroke-linecap="round"
    filter="url(#glow)"
    opacity="0.85"
  />
</svg>

