<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070f" />
      <stop offset="0.55" stop-color="#070c1a" />
      <stop offset="1" stop-color="#05070f" />
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0.95" />
      <stop offset="0.55" stop-color="#b7ff3c" stop-opacity="0.72" />
      <stop offset="1" stop-color="#ff2bd6" stop-opacity="0.7" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />

  <!-- subtle grid -->
  <g opacity="0.2" stroke="#ffffff" stroke-width="1">
    <path d="M0 150H1600" />
    <path d="M0 300H1600" />
    <path d="M0 450H1600" />
    <path d="M0 600H1600" />
    <path d="M0 750H1600" />
    <path d="M200 0V900" />
    <path d="M400 0V900" />
    <path d="M600 0V900" />
    <path d="M800 0V900" />
    <path d="M1000 0V900" />
    <path d="M1200 0V900" />
    <path d="M1400 0V900" />
  </g>

  <!-- trajectory -->
  <path
    d="M120 740C320 520 420 820 600 600C780 360 860 720 1040 520C1210 320 1300 260 1480 220"
    fill="none"
    stroke="url(#g)"
    stroke-width="12"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- failure trajectory (baseline) -->
  <path
    d="M140 760C360 640 520 710 680 720C820 730 900 760 1020 820"
    fill="none"
    stroke="rgba(255,255,255,0.22)"
    stroke-width="10"
    stroke-linecap="round"
    stroke-dasharray="18 14"
  />

  <!-- labels -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" fill="rgba(255,255,255,0.82)">
    <text x="90" y="120" font-size="56" font-weight="800">Teaser placeholder</text>
    <text x="90" y="172" font-size="24" fill="rgba(255,255,255,0.72)">
      Replace with your camera-ready Figure 1 (trajectory + comparisons).
    </text>
    <text x="90" y="220" font-size="22" fill="rgba(0,229,255,0.9)" font-weight="700">
      LongStream · stable metric-scale streaming
    </text>

    <text x="94" y="820" font-size="18" fill="rgba(255,255,255,0.66)">
      Solid: ours · Dashed: baseline collapse
    </text>
  </g>
</svg>

