<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070f" />
      <stop offset="0.6" stop-color="#070c1a" />
      <stop offset="1" stop-color="#05070f" />
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0.9" />
      <stop offset="0.55" stop-color="#b7ff3c" stop-opacity="0.65" />
      <stop offset="1" stop-color="#ff2bd6" stop-opacity="0.6" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />

  <g opacity="0.2">
    <path d="M0 160H1600" stroke="#ffffff" stroke-width="1" />
    <path d="M0 320H1600" stroke="#ffffff" stroke-width="1" />
    <path d="M0 480H1600" stroke="#ffffff" stroke-width="1" />
    <path d="M0 640H1600" stroke="#ffffff" stroke-width="1" />
    <path d="M0 800H1600" stroke="#ffffff" stroke-width="1" />
    <path d="M160 0V900" stroke="#ffffff" stroke-width="1" />
    <path d="M320 0V900" stroke="#ffffff" stroke-width="1" />
    <path d="M480 0V900" stroke="#ffffff" stroke-width="1" />
    <path d="M640 0V900" stroke="#ffffff" stroke-width="1" />
    <path d="M800 0V900" stroke="#ffffff" stroke-width="1" />
    <path d="M960 0V900" stroke="#ffffff" stroke-width="1" />
    <path d="M1120 0V900" stroke="#ffffff" stroke-width="1" />
    <path d="M1280 0V900" stroke="#ffffff" stroke-width="1" />
    <path d="M1440 0V900" stroke="#ffffff" stroke-width="1" />
  </g>

  <path
    d="M120 720C320 520 430 760 600 560C780 350 840 690 1010 520C1180 350 1260 260 1480 220"
    fill="none"
    stroke="url(#g)"
    stroke-width="10"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" fill="rgba(255,255,255,0.78)">
    <text x="90" y="120" font-size="54" font-weight="800">Demo video placeholder</text>
    <text x="90" y="170" font-size="26">Drop your <tspan fill="#00e5ff" font-weight="700">demo.mp4</tspan> into longstream/static/videos/</text>
  </g>
</svg>

